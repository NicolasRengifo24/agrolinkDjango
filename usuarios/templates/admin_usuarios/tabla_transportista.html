<div class="tab-pane fade" id="transportistas">

    <div class="table-responsive">
        <table class="table table-hover align-middle">

            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Teléfono</th>
                    <th>Ciudad</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody id="tablaTransportistas">

                {% for t in transportistas %}
                <tr>
                    <td>#{{ forloop.counter }}</td>
                    
                    <td>{{ t.id_usuario.nombre }}</td>
                    <td>{{ t.id_usuario.correo }}</td>
                    <td>{{ t.id_usuario.telefono }}</td>
                    <td>{{ t.id_usuario.ciudad }}</td>
                    <td>
                        {% if t.id_usuario.estado %}
                            <span class="badge bg-success">Activo</span>
                        {% else %}
                            <span class="badge bg-danger">Inactivo</span>
                        {% endif %}
                    </td>
                    <td>
                        <button class="btn btn-info btn-sm" onclick="alert('Función en desarrollo')">Ver</button>
                        <button class="btn btn-warning btn-sm" onclick="alert('Función en desarrollo')">Editar</button>
                        <button class="btn btn-danger btn-sm" onclick="alert('Función en desarrollo')">Eliminar</button>
                    </td>
                </tr>
                {% endfor %}

            </tbody>

        </table>
    </div>

</div>
