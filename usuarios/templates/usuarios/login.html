{% load static %}
<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar Sesión | AgroLink</title>

  <!-- BOOTSTRAP 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>

<body>

  <div class="login-card">

    <a href="{% url 'inicio_usuarios' %}" class="text-agro mb-3 d-block text-decoration-none">
      ← Volver al inicio
    </a>

    <h1 class="fw-bold text-agro mb-2 text-center">Iniciar Sesión</h1>
    <p class="text-secondary text-center mb-4">Bienvenido a la red agrícola sostenible 🌱</p>

    <!-- BOTONES SOCIALES -->
    <div class="row g-3 mb-4">
      <div class="col-12 col-sm-6">
        <button class="btn btn-light w-100 border shadow-sm" type="button">
          <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="20" class="me-2" alt="Google">
          Google
        </button>
      </div>

      <div class="col-12 col-sm-6">
        <button class="btn btn-light w-100 border shadow-sm" type="button">
          <img src="https://www.svgrepo.com/show/354141/twitter.svg" width="20" class="me-2" alt="Twitter">
          X (Twitter)
        </button>
      </div>
    </div>

    <div class="text-center my-3 text-secondary">— o ingresar con email —</div>

    <!-- FORMULARIO -->
    <form method="post" action="{% url 'login_view' %}">
      {% csrf_token %}

      <div class="mb-3">
        <label for="id_username" class="form-label text-agro">Usuario *</label>
        <input type="text" name="username" id="id_username" class="form-control" required>
      </div>

      <div class="mb-3">
        <label for="id_password" class="form-label text-agro">Contraseña *</label>
        <div class="input-group">
          <input type="password" name="password" id="id_password" class="form-control" required>
          <button class="btn btn-outline-success" type="button"
            onclick="const inp=document.getElementById('id_password'); inp.type = inp.type==='password' ? 'text':'password';">
            👁️
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-agro w-100 py-2 fs-5">Ingresar</button>
    </form>

    <p class="mt-4 text-center">
      ¿No tienes cuenta?
      <a href="{% url 'mostrar_registro_usuarios' %}" class="text-agro text-decoration-none fw-semibold">Crear
        cuenta</a>
    </p>

  </div>

  <!-- JS Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
