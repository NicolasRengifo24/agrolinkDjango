¿<script>

// Filtro por stock
document.getElementById('stockFilter')?.addEventListener('change', function(){

    let val = this.value;
    let rows = document.querySelectorAll('.producto-item');

    rows.forEach(r => {

        let stock = parseInt(r.dataset.stock);

        if(val === 'disponible' && stock < 10) r.style.display = 'none';
        else if(val === 'bajo' && (stock >= 10 || stock == 0)) r.style.display = 'none';
        else if(val === 'agotado' && stock > 0) r.style.display = 'none';
        else r.style.display = '';

    });

});

</script>
