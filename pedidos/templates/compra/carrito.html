{% load static %}
<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Agrolink – Carrito de Compras</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- AOS Animaciones -->
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'estilos_carrito_compras.css'% }">

</head>
<body>

<!-- NAVBAR -->
{% include 'components/navbar.html'%}
<!-- CONTENIDO PRINCIPAL -->
{% block content %}
{% endblock% }
<!--Footer-->
{% include 'components/footer.html' %}

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- AOS -->
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script>AOS.init({ duration: 900, once: true });</script>

<!-- Script para prevenir acceso desde caché después de logout -->
<script>
    // Prevenir que la página se cargue desde el caché del navegador
    window.addEventListener('pageshow', function(event) {
        if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
            // La página se cargó desde el caché (botón atrás)
            window.location.reload();
        }
    });

    // Prevenir navegación hacia atrás después de logout
    window.addEventListener('load', function() {
        window.history.pushState(null, "", window.location.href);
        window.addEventListener('popstate', function() {
            window.history.pushState(null, "", window.location.href);
        });
    });
</script>

</body>
</html>
