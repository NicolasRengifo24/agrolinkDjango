{% load static %}
<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">

        <!-- LOGO -->
        <a class="navbar-brand brand-logo">
            <img src="{% static 'logo/logoAgrolink.jpeg' %}" alt="Logo Agrolink">
            Agrolink
        </a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">

            <ul class="navbar-nav ms-auto align-items-center">

                <li class="nav-item me-3">
                    <a class="nav-link" style="color:#c6dc93; font-weight:600;">Inicio</a>
                </li>

                


                <!-- MIS PEDIDOS -->
                <li class="nav-item me-3">
                    <a class="nav-link" style="color:#c6dc93; font-weight:600;">
                        <i class="bi bi-car-front"></i> Mis Vehículos
                    </a>
                </li>


                <!-- PERFIL -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle d-flex align-items-center" data-bs-toggle="dropdown" style="color:#c6dc93">
                        <img src="https://i.pravatar.cc/40?img=10" class="profile-img me-2" alt="Perfil">
                        {% if user.is_authenticated %}
                        <span>{{ user.first_name }}</span>
                        {% else %}
                        <span>Visitante</span>
                        {% endif %}
                    </a>

                    <ul class="dropdown-menu dropdown-menu-end">
                        {% if user.is_authenticated %}
                        <li><a class="dropdown-item"><i class="bi bi-person me-2"></i>Mi perfil</a></li>
                        <li><a class="dropdown-item" href="#"><i class="bi bi-gear me-2"></i>Configuración</a></li>
                        <li>
                            <hr>
                        </li>
                        <li>
                            <form method="post" action="{% url 'logout_view' %}" style="margin: 0;">
                                {% csrf_token %}
                                <button type="submit" class="dropdown-item text-danger"
                                    style="border:none; background:none; cursor:pointer; width:100%; text-align:left;">
                                    <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
                                </button>
                            </form>
                        </li>
                        {% else %}
                        <li>
                            <a class="dropdown-item" href="{% url 'login_view' %}">
                                <i class="bi bi-person me-2"></i>Logeate Aquí
                            </a>
                        </li>
                        {% endif %}
                    </ul>
                </li>

            </ul>

        </div>

    </div>
</nav>
